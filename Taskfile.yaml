version: '3'

env:
  OS: '{{OS}}'

vars:
  HOSTNAME:
    sh: hostname

tasks:
  up:
    cmds:
      - nix flake update
      - nix --accept-flake-config run nixpkgs#home-manager -- switch --flake .#{{.HOSTNAME}}
      - nix-collect-garbage --delete-old
  update:
    cmds:
      - nix flake update
  hmsw: # home-manager switch
    cmds:
      - nix --accept-flake-config run nixpkgs#home-manager -- switch --flake .#{{.HOSTNAME}}
  gc:
    cmds:
      - nix-collect-garbage --delete-old
  darwin-sw: # nix-darwin switch
    platforms: [darwin]
    cmds:
      - nix --accept-flake-config run nix-darwin -- switch --flake .#{{.HOSTNAME}}
